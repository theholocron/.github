---
# Conventional Commits title matching (include-title: 1 in bookkeeping-pr.yml)
# Patterns use [!:(] to match all valid CC forms:
#   fix:          normal fix
#   fix(scope):   scoped fix
#   fix!:         breaking fix
#   fix!(scope):  breaking scoped fix
chore:
  - "^chore[!:(]"

ci:
  - "^ci[!:(]"

documentation:
  - "^docs[!:(]"

bug:
  - "^fix[!:(]"

enhancement:
  - "^feat[!:(]"

refactor:
  - "^refactor[!:(]"

performance:
  - "^perf[!:(]"

test:
  - "^test[!:(]"
