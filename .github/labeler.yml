---
# Conventional Commits title matching (include-title: 1 in bookkeeping-pr.yml)
# Patterns use [:(] to match exactly — ^fix alone would match "fixture", "fixing", etc.
chore:
  - "^chore[:(]"

ci:
  - "^ci[:(]"

documentation:
  - "^docs[:(]"

bug:
  - "^fix[:(]"

enhancement:
  - "^feat[:(]"

refactor:
  - "^refactor[:(]"

performance:
  - "^perf[:(]"

test:
  - "^test[:(]"
