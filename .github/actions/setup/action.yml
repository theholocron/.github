name: Setup
description: Install pnpm and Node.js, then install dependencies with a frozen lockfile.

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "22.x"
  pnpm-version:
    description: pnpm major version
    required: false
    default: "10"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
