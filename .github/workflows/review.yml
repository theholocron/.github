name: Review

# ReviewDog is the annotation layer — runs linters and posts inline PR diff
# annotations. Runs on pull_request only (annotation reporters require PR context).
# super-linter (lint.yml) is the CI gate that runs on push + PR.
# Gitleaks and YAML are intentionally duplicated here: super-linter catches
# them as CI failures, ReviewDog surfaces them as inline diff annotations.

on:
  workflow_call:

concurrency:
  group: review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reviewdog:
    name: Review PRs
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Node project
        id: node
        shell: bash
        run: |
          if [[ -f package.json ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Setup Node
        if: steps.node.outputs.enabled == 'true'
        uses: theholocron/.github/.github/actions/setup-node@main

      - name: Install dependencies
        if: steps.node.outputs.enabled == 'true'
        uses: theholocron/.github/.github/actions/install@main
      
      - name: Install ReviewDog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      #
      # Always applicable
      #

      - name: Gitleaks (secrets)
        uses: reviewdog/action-gitleaks@v1
        with:
          reporter: github-pr-check

      - name: YamlLint
        uses: reviewdog/action-yamllint@v1
        with:
          reporter: github-pr-check

      - name: ActionLint (GitHub Actions)
        if: ${{ hashFiles('.github/workflows/*.yml', '.github/workflows/*.yaml') != '' }}
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check

      #
      # TypeScript / JavaScript
      #

      - name: ESLint
        if: >-
          ${{
            hashFiles(
              '**/eslint.config.js',
              '**/eslint.config.mjs',
              '**/eslint.config.cjs',
              '**/eslint.config.ts',
              '**/.eslintrc',
              '**/.eslintrc.js',
              '**/.eslintrc.cjs',
              '**/.eslintrc.json',
              '**/.eslintrc.yaml',
              '**/.eslintrc.yml'
            ) != ''
          }}
        uses: reviewdog/action-eslint@v1
        with:
          reporter: github-pr-check
          eslint_flags: .

      - name: TypeScript
        if: ${{ hashFiles('**/tsconfig.json') != '' }}
        uses: EPMatt/reviewdog-action-tsc@v1
        with:
          reporter: github-pr-check

      #
      # Shell
      #

      - name: ShellCheck
        if: ${{ hashFiles('**/*.sh') != '' }}
        uses: reviewdog/action-shellcheck@v1
        with:
          reporter: github-pr-check
          fail_level: none

      #
      # Docker
      #

      - name: Hadolint
        if: >-
          ${{
            hashFiles(
              '**/Dockerfile',
              '**/*.Dockerfile',
              '**/Containerfile'
            ) != ''
          }}
        uses: reviewdog/action-hadolint@v1
        with:
          reporter: github-pr-check
          fail_level: none

      #
      # Environment files
      #

      - name: dotenv-linter
        if: ${{ hashFiles('**/.env*') != '' }}
        uses: dotenv-linter/action-dotenv-linter@v2
        with:
          reporter: github-code-suggestions

      #
      # Documentation
      #

      - name: Alex (inclusive language)
        if: ${{ hashFiles('**/*.md') != '' }}
        uses: reviewdog/action-alex@v1
        with:
          reporter: github-pr-check
