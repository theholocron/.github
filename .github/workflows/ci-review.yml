name: Review (reusable)

# ReviewDog is the annotation layer — runs linters and posts inline PR diff
# annotations. Runs on pull_request only (annotation reporters require PR context).
# super-linter (ci-lint.yml) is the CI gate that runs on push + PR.

on:
  workflow_call:

jobs:
  reviewdog:
    name: Review PRs
    permissions:
      contents: read
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout repository

      - uses: theholocron/.github/.github/actions/setup@main
        name: Setup

      - uses: reviewdog/action-setup@v1
        name: Install ReviewDog
        with:
          reviewdog_version: latest

      - uses: reviewdog/action-eslint@v1
        name: ESLint
        with:
          reporter: github-pr-check
          eslint_flags: "."

      - uses: EPMatt/reviewdog-action-tsc@v1
        name: TypeScript
        with:
          reporter: github-pr-check

      - uses: reviewdog/action-shellcheck@v1
        name: ShellCheck
        with:
          reporter: github-pr-check
          fail_on_error: false

      - uses: reviewdog/action-hadolint@v1
        name: Hadolint (Dockerfile)
        with:
          reporter: github-pr-check
          fail_on_error: false

      - uses: reviewdog/action-actionlint@v1
        name: ActionLint (GitHub Actions)
        with:
          reporter: github-pr-check

      - uses: dotenv-linter/action-dotenv-linter@v2
        name: dotenv-linter
        with:
          reporter: github-code-suggestions

      - uses: reviewdog/action-alex@v1
        name: Alex (inclusive language)
        with:
          reporter: github-pr-check
