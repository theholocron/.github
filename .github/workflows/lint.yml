name: Lint (reusable)

on:
  workflow_call:
    inputs:
      eslint-config-file:
        type: string
        required: false
        default: eslint.config.js
      typescript-tsconfig-file:
        type: string
        required: false
        default: tsconfig.json
      prettier-config:
        type: string
        required: false
        default: prettier.config.js
      yaml-config:
        type: string
        required: false
        default: yamllint.config.yml
      enable-auto-commit:
        description: Auto-commit super-linter fixes via GPG-signed commit
        type: boolean
        required: false
        default: false
    secrets:
      SUPER_LINTER_GPG_PRIVATE_KEY:
        required: false
      SUPER_LINTER_GPG_PASSPHRASE:
        required: false

jobs:
  super-lint:
    name: Lint entire codebase
    permissions:
      contents: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout repository
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: theholocron/.github/.github/actions/setup@main
        name: Setup

      - uses: super-linter/super-linter/slim@v7.1.0
        name: Run Super Linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANNOTATE_ONLY: true
          DISABLE_COMMENTS: false
          IGNORE_GITIGNORED_FILES: true
          LINTER_RULES_PATH: /
          EDITORCONFIG_FILE_NAME: ".editorconfig-checker.json"
          FIX_ENV: true
          FIX_GRAPHQL_PRETTIER: true
          FIX_HTML_PRETTIER: true
          FIX_JAVASCRIPT_PRETTIER: true
          FIX_JSX_PRETTIER: true
          FIX_MARKDOWN_PRETTIER: true
          FIX_TSX: true
          FIX_TYPESCRIPT_PRETTIER: true
          JAVASCRIPT_ES_CONFIG_FILE: ${{ inputs.eslint-config-file }}
          PRETTIER_CONFIG: ${{ inputs.prettier-config }}
          TYPESCRIPT_ES_CONFIG_FILE: ${{ inputs.eslint-config-file }}
          TYPESCRIPT_STANDARD_TSCONFIG_FILE: ${{ inputs.typescript-tsconfig-file }}
          VALIDATE_DOCKERFILE: true
          VALIDATE_EDITORCONFIG: true
          VALIDATE_ENV: true
          VALIDATE_GIT_COMMITLINT: true
          VALIDATE_GIT_MERGE_CONFLICT_MARKERS: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_GITLEAKS: true
          VALIDATE_GRAPHQL_PRETTIER: true
          VALIDATE_HTML_PRETTIER: true
          VALIDATE_JAVASCRIPT_PRETTIER: true
          VALIDATE_JSX_PRETTIER: true
          VALIDATE_MARKDOWN_PRETTIER: true
          VALIDATE_TSX: true
          VALIDATE_TYPESCRIPT_PRETTIER: true
          VALIDATE_YAML: true
          YAML_CONFIG_FILE: ${{ inputs.yaml-config }}

      - uses: crazy-max/ghaction-import-gpg@v6
        name: Import GPG Key
        if: ${{ inputs.enable-auto-commit == true }}
        with:
          git_user_signingkey: true
          git_commit_gpgsign: true
          GPG_PRIVATE_KEY: ${{ secrets.SUPER_LINTER_GPG_PRIVATE_KEY }}
          PASSPHRASE: ${{ secrets.SUPER_LINTER_GPG_PASSPHRASE }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        name: Commit and push linting fixes
        if: >
          inputs.enable-auto-commit == true &&
          github.event_name == 'pull_request' &&
          github.ref_name != github.event.repository.default_branch
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: "chore: fix linting issues"
          commit_options: "--no-verify --signoff"
          commit_user_name: super-linter
          commit_user_email: super-linter@super-linter.dev
