name: Release

# Semantic-release with OIDC Trusted Publishing — no NPM_TOKEN required.
# The calling repo must have a .releaserc.json that configures branches,
# plugins, and any publish options. npm@11+ is installed to support OIDC.

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      run-build:
        description: Run `pnpm build` before releasing
        type: boolean
        required: false
        default: true
    secrets:
      RELEASE_TOKEN:
        description: >
          Fine-grained PAT (Contents + Issues + Pull requests: write) owned by
          an admin. Required when the default branch is protected by a ruleset —
          github.token cannot push through rulesets, but an admin PAT can.
          Takes priority over SYNC_TOKEN. Falls back to github.token.
        required: false
      SYNC_TOKEN:
        description: >
          Legacy alias for RELEASE_TOKEN — kept for backward compatibility.
          Prefer RELEASE_TOKEN for new repos.
        required: false

jobs:
  release:
    name: Semantic release
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Do not cancel in-progress releases — a partial release is worse than a slow one.
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        name: Checkout repository
        with:
          fetch-depth: 0
          # Use SYNC_TOKEN when available — git push (tags, release commits)
          # uses the checkout credential, not GITHUB_TOKEN env var. The
          # built-in github.token cannot push through branch protection rulesets.
          token: ${{ secrets.RELEASE_TOKEN || secrets.SYNC_TOKEN || github.token }}

      - uses: theholocron/.github/.github/actions/setup@main
        name: Setup

      - name: Configure git identity
        run: |
          GIT_NAME=$(gh api user --jq .name 2>/dev/null || echo "github-actions[bot]")
          GIT_EMAIL=$(gh api user --jq '"\(.id)+\(.login)@users.noreply.github.com"' 2>/dev/null || echo "41898282+github-actions[bot]@users.noreply.github.com")
          git config --global user.name "$GIT_NAME"
          git config --global user.email "$GIT_EMAIL"
          git config --global format.signoff true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.SYNC_TOKEN || github.token }}

      - run: npm install -g npm@11 sigstore
        name: Upgrade npm for OIDC support
        # sigstore is required by libnpmpublish/provenance.js at module parse
        # time — before any config takes effect. Some npm 11.x builds stopped
        # bundling it; installing it globally into the same prefix ensures it
        # resolves regardless of npm version. (Discovered 2026-07-09.)

      - run: pnpm build
        name: Build
        if: ${{ inputs.run-build == true }}

      - run: npx semantic-release
        name: Release
        env:
          # Prefer RELEASE_TOKEN (fine-grained PAT, Contents+Issues+PRs write,
          # owned by an admin with ruleset bypass) so @semantic-release/git can
          # push the version-bump commit through branch protection. Falls back to
          # SYNC_TOKEN (legacy) then github.token for unprotected repos.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.SYNC_TOKEN || github.token }}
          NPM_CONFIG_PROVENANCE: true
