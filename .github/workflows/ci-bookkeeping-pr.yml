name: PR Bookkeeping (reusable)

on:
  workflow_call:

jobs:
  label:
    name: Add Labels to PRs
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: github/issue-labeler@v3.4
        with:
          configuration-path: .github/labeler.yml
          include-title: 1
          include-body: 0
          sync-labels: 1
          enable-versioned-regex: 0
          repo-token: ${{ secrets.GITHUB_TOKEN }}
